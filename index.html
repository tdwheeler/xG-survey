<title>xG Graph — Research Topic Survey</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface-hover: #1a2332;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-muted: #8896ab;
    --text-dim: #4a5568;
    --accent: #3b82f6;
    --accent-bright: #60a5fa;
    --accent-glow: rgba(59, 130, 246, 0.15);
    --green: #22c55e;
    --green-dim: rgba(34, 197, 94, 0.12);
    --red: #ef4444;
    --red-dim: rgba(239, 68, 68, 0.12);
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    line-height: 1.6; min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10, 14, 23, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 40px; height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .topbar-logo { font-weight: 700; font-size: 15px; letter-spacing: 0.5px; color: var(--accent-bright); }
  .topbar-logo span { color: var(--text-muted); font-weight: 400; }
  .progress-bar { display: flex; gap: 6px; align-items: center; }
  .progress-dot {
    width: 28px; height: 4px; border-radius: 2px;
    background: var(--border); transition: all 0.4s ease;
  }
  .progress-dot.active { background: var(--accent); width: 40px; }
  .progress-dot.done { background: var(--green); }
  .progress-label {
    font-size: 12px; color: var(--text-muted); margin-left: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── Main ── */
  .main { max-width: 720px; margin: 0 auto; padding: 100px 24px 60px; }
  .page { display: none; animation: fadeUp 0.4s ease; }
  .page.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Typography ── */
  .page-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--accent); margin-bottom: 8px;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  h1 { font-size: 28px; font-weight: 700; line-height: 1.3; margin-bottom: 12px; }
  .subtitle { font-size: 15px; color: var(--text-muted); margin-bottom: 32px; max-width: 560px; }

  /* ── Intro ── */
  .intro-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px; margin-bottom: 20px;
  }
  .intro-card h3 { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent-bright); }
  .intro-card p { font-size: 14px; color: var(--text-muted); line-height: 1.7; }
  .startup-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--accent-glow); border: 1px solid rgba(59, 130, 246, 0.3);
    border-radius: 6px; padding: 6px 14px;
    font-size: 14px; font-weight: 600; color: var(--accent-bright);
    margin-bottom: 24px;
  }
  .time-estimate {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text-dim); margin-top: 20px;
  }

  /* ── Free input (Page 1) ── */
  .topic-input-row {
    display: flex; gap: 10px; align-items: flex-start;
    margin-bottom: 10px; animation: fadeUp 0.3s ease;
  }
  .topic-input-row input[type="text"] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  .topic-input-row input[type="text"]:focus { border-color: var(--accent); }
  .topic-input-row input[type="text"]::placeholder { color: var(--text-dim); }

  .relevance-control {
    display: flex; gap: 3px; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; min-width: 170px;
  }
  .relevance-control span.label {
    font-size: 11px; color: var(--text-dim); margin-right: 4px;
    font-family: 'JetBrains Mono', monospace; white-space: nowrap;
  }
  .rel-btn {
    width: 30px; height: 30px; border: none; border-radius: 5px;
    background: transparent; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s ease;
  }
  .rel-btn:hover { background: var(--surface-hover); color: var(--text); }
  .rel-btn.selected { background: var(--accent); color: #fff; }

  .remove-row-btn {
    width: 36px; height: 42px; border: none; border-radius: 8px;
    background: transparent; color: var(--text-dim);
    font-size: 18px; cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .remove-row-btn:hover { background: var(--red-dim); color: var(--red); }

  .add-topic-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: transparent; border: 1px dashed var(--border);
    border-radius: 8px; padding: 10px 16px;
    color: var(--text-muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s; margin-top: 4px;
  }
  .add-topic-btn:hover {
    border-color: var(--accent); color: var(--accent-bright); background: var(--accent-glow);
  }

  /* ── Suggestions (Page 2) ── */
  .suggestion-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px 20px;
    margin-bottom: 10px; transition: all 0.2s;
  }
  .suggestion-card.confirmed { border-color: rgba(34, 197, 94, 0.4); background: var(--green-dim); }
  .suggestion-card.removed { border-color: rgba(239, 68, 68, 0.3); background: var(--red-dim); opacity: 0.5; }
  .suggestion-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;
  }
  .suggestion-title { font-weight: 600; font-size: 15px; }
  .suggestion-domain {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-dim); background: rgba(255,255,255,0.04);
    padding: 3px 8px; border-radius: 4px;
  }
  .suggestion-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 14px; }
  .suggestion-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .action-btn {
    padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .action-btn.confirm { border-color: rgba(34,197,94,0.4); color: var(--green); }
  .action-btn.confirm:hover { background: var(--green-dim); }
  .action-btn.confirm.active { background: var(--green-dim); border-color: var(--green); }
  .action-btn.reject { border-color: rgba(239,68,68,0.3); color: var(--red); }
  .action-btn.reject:hover { background: var(--red-dim); }
  .action-btn.reject.active { background: var(--red-dim); border-color: var(--red); }

  .weight-display {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    color: var(--text-dim); margin-left: auto;
    display: flex; align-items: center; gap: 6px;
  }
  .weight-display input {
    width: 50px; text-align: center; background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 4px; padding: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--text); outline: none;
  }
  .weight-display input:focus { border-color: var(--accent); }

  /* ── Topic list (Page 3) ── */
  .domain-group { margin-bottom: 24px; }
  .domain-label {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--text-dim); margin-bottom: 8px; padding-left: 2px;
  }
  .topic-checkbox {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px;
    cursor: pointer; transition: background 0.15s; margin-bottom: 2px;
  }
  .topic-checkbox:hover { background: var(--surface-hover); }
  .topic-checkbox.checked { background: var(--accent-glow); }
  .topic-checkbox.pre-selected { background: var(--green-dim); cursor: default; }
  .topic-checkbox input { display: none; }
  .check-box {
    width: 20px; height: 20px; border: 1.5px solid var(--border);
    border-radius: 5px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0; font-size: 12px; color: transparent;
  }
  .topic-checkbox.checked .check-box,
  .topic-checkbox.pre-selected .check-box {
    border-color: var(--accent); background: var(--accent); color: #fff;
  }
  .topic-checkbox.pre-selected .check-box { background: var(--green); border-color: var(--green); }
  .topic-name { font-size: 14px; }
  .topic-already {
    font-size: 11px; color: var(--green);
    font-family: 'JetBrains Mono', monospace; margin-left: auto;
  }

  /* ── Free text (Page 4) ── */
  textarea {
    width: 100%; min-height: 120px; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: var(--text); line-height: 1.6; resize: vertical; outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }

  /* ── Summary (Page 5) ── */
  .summary-section { margin-bottom: 24px; }
  .summary-section h3 {
    font-size: 14px; font-weight: 600; color: var(--accent-bright); margin-bottom: 10px;
  }
  .summary-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--surface);
    border-radius: 8px; margin-bottom: 4px; font-size: 14px;
  }
  .summary-item .weight-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    background: var(--accent-glow); color: var(--accent-bright);
    padding: 3px 10px; border-radius: 4px;
  }
  .summary-item .weight-badge.removed {
    background: var(--red-dim); color: var(--red);
  }

  /* ── Nav ── */
  .nav-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 40px; padding-top: 24px; border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 12px 28px; border-radius: 8px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    font-weight: 600; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .nav-btn.secondary {
    background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
  }
  .nav-btn.secondary:hover { border-color: var(--text-muted); color: var(--text); }
  .nav-btn.primary { background: var(--accent); color: #fff; }
  .nav-btn.primary:hover { background: #2563eb; }
  .nav-btn.finish { background: var(--green); color: #fff; }
  .nav-btn.finish:hover { background: #16a34a; }

  /* ── Error page ── */
  .error-page {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 80vh; text-align: center; padding: 24px;
  }
  .error-page h1 { font-size: 24px; margin-bottom: 12px; }
  .error-page p { color: var(--text-muted); max-width: 400px; }

  /* ── Thank you ── */
  .thank-you { text-align: center; padding: 60px 0; }
  .thank-you .check-circle {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--green-dim); border: 2px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; color: var(--green); margin: 0 auto 24px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .topbar { padding: 0 16px; }
    .main { padding: 80px 16px 40px; }
    h1 { font-size: 22px; }
    .topic-input-row { flex-wrap: wrap; }
    .relevance-control { min-width: unset; flex: 1; }
    .suggestion-actions { flex-direction: column; }
    .weight-display { margin-left: 0; margin-top: 6px; }
  }
</style>

      <div class="nav-bar">

    <!-- PAGE 1: OPEN PROMPT -->

// ═══════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════

let currentPage = 0;

function goTo(n) {
  document.getElementById(`page-${currentPage}`).classList.remove('active');
  document.getElementById(`page-${n}`).classList.add('active');
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById(`dot-${i}`);
    if (!dot) continue;
    dot.classList.remove('active', 'done');
    if (i < n) dot.classList.add('done');
    if (i === n) dot.classList.add('active');
  }
  document.getElementById('progress-label').textContent = `${n + 1} / 6`;
  currentPage = n;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setRel(btn, val) {
  btn.parentElement.querySelectorAll('.rel-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function removeRow(btn) {
  const row = btn.closest('.topic-input-row');
  if (document.querySelectorAll('.topic-input-row').length > 1) {
    row.style.opacity = '0'; row.style.transform = 'translateX(20px)';
    row.style.transition = 'all 0.2s ease';
    setTimeout(() => row.remove(), 200);
  }
}

function addRow() {
  const container = document.getElementById('free-topics');
  const row = document.createElement('div');
  row.className = 'topic-input-row';
  row.innerHTML = `
    <input type="text" placeholder="Add another topic..." />
    <div class="relevance-control"><span class="label">Relevance</span>
      <button class="rel-btn" onclick="setRel(this,1)">1</button>
      <button class="rel-btn" onclick="setRel(this,2)">2</button>
      <button class="rel-btn" onclick="setRel(this,3)">3</button>
      <button class="rel-btn selected" onclick="setRel(this,4)">4</button>
      <button class="rel-btn" onclick="setRel(this,5)">5</button>
    </div>
    <button class="remove-row-btn" onclick="removeRow(this)">×</button>`;
  container.appendChild(row);
}

function toggleSuggestion(btn, type) {
  const card = btn.closest('.suggestion-card');
  const confirmBtn = card.querySelector('.action-btn.confirm');
  const rejectBtn = card.querySelector('.action-btn.reject');
  if (type === 'confirm') {
    const active = confirmBtn.classList.contains('active');
    confirmBtn.classList.toggle('active', !active);
    rejectBtn.classList.remove('active');
    card.classList.toggle('confirmed', !active);
    card.classList.remove('removed');
  } else {
    const active = rejectBtn.classList.contains('active');
    rejectBtn.classList.toggle('active', !active);
    confirmBtn.classList.remove('active');
    card.classList.toggle('removed', !active);
    card.classList.remove('confirmed');
  }
}

function toggleCheck(label) {
  if (label.querySelector('.topic-already')) return;
  const cb = label.querySelector('input');
  cb.checked = !cb.checked;
  label.classList.toggle('checked', cb.checked);
}

function buildSummary() {
  let summaryHTML = '';
  let emailLines = [`xG Graph Survey Response — ${startup.name}`, ''];

  // 1. Free topics
  summaryHTML += '<div class="summary-section"><h3>Your topics (unprompted)</h3>';
  emailLines.push('== YOUR TOPICS (UNPROMPTED) ==');
  document.querySelectorAll('#free-topics .topic-input-row').forEach(row => {
    const text = row.querySelector('input[type="text"]').value.trim();
    const sel = row.querySelector('.rel-btn.selected');
    const val = sel ? sel.textContent : '4';
    if (text) {
      summaryHTML += `<div class="summary-item"><span>${text}</span><span class="weight-badge">${val}/5</span></div>`;
      emailLines.push(`  ${text} — relevance: ${val}/5`);
    }
  });
  summaryHTML += '</div>';
  emailLines.push('');

  // 2. Suggestions
  summaryHTML += '<div class="summary-section"><h3>Our suggestions — your response</h3>';
  emailLines.push('== OUR SUGGESTIONS — YOUR RESPONSE ==');
  document.querySelectorAll('.suggestion-card').forEach(card => {
    const name = card.querySelector('.suggestion-title').textContent;
    const confirmed = card.classList.contains('confirmed');
    const removed = card.classList.contains('removed');
    const weight = card.querySelector('.weight-display input').value;
    let status, badgeClass = '';
    if (removed) { status = '✗ removed'; badgeClass = ' removed'; }
    else if (confirmed) { status = `✓ confirmed (${weight})`; }
    else { status = `no response (${weight})`; }
    summaryHTML += `<div class="summary-item"><span>${name}</span><span class="weight-badge${badgeClass}">${status}</span></div>`;
    emailLines.push(`  ${name} — ${status}`);
  });
  summaryHTML += '</div>';
  emailLines.push('');

  // 3. Additional
  const extras = [];
  document.querySelectorAll('#page-3 .topic-checkbox:not(.pre-selected) input:checked').forEach(cb => {
    extras.push(cb.getAttribute('data-label'));
  });
  if (extras.length) {
    summaryHTML += '<div class="summary-section"><h3>Additional topics selected</h3>';
    emailLines.push('== ADDITIONAL TOPICS SELECTED ==');
    extras.forEach(name => {
      summaryHTML += `<div class="summary-item"><span>${name}</span></div>`;
      emailLines.push(`  ${name}`);
    });
    summaryHTML += '</div>';
    emailLines.push('');
  }

  // 4. Free text
  const freeText = document.getElementById('free-text').value.trim();
  if (freeText) {
    summaryHTML += `<div class="summary-section"><h3>Additional comments</h3><div class="summary-item"><span>${freeText}</span></div></div>`;
    emailLines.push('== ADDITIONAL COMMENTS ==');
    emailLines.push(`  ${freeText}`);
    emailLines.push('');
  }

  document.getElementById('summary-content').innerHTML = summaryHTML;

  // Build email link
  const subject = encodeURIComponent(`xG Graph Survey Response — ${startup.name}`);
  const body = encodeURIComponent(emailLines.join('\n'));
  document.getElementById('email-btn').href = `mailto:${CONTACT_EMAIL}?subject=${subject}&body=${body}`;
  document.getElementById('email-btn').onclick = function() {
    setTimeout(() => {
      document.querySelector('.nav-bar:last-of-type').style.display = 'none';
      document.getElementById('thank-you').style.display = 'block';
      document.getElementById('fallback-text').value = emailLines.join('\n');
    }, 500);
  };
}
</script>
